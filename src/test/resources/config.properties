# ─── Browser ─────────────────────────────────────────────
# Supported values: chrome | edge | firefox
browser=chrome
mobile.device=Nexus 5

# ─── URLs ────────────────────────────────────────────────
base.url=https://www.twitch.tv

# ─── Timeouts (seconds) ──────────────────────────────────
page.load.timeout=60
explicit.wait=30
script.timeout=30
modal.check.timeout=4

# ─── Wait durations (milliseconds) ───────────────────────
# Pause after streamer page spinner clears — React components may still be mounting
streamer.stabilization.ms=1500
# Pause after each scroll — allows lazy-loaded content to render
scroll.wait.ms=800
